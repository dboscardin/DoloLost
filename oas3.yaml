openapi: '3.0.3'
info:
  title: DoloLost OpenApi 3.0
  description: Api per progetto DoloLost
  version: '1.0'
servers:
  - url: http://localhost:8080/api/v1
    description: Api v1 in localhost
paths:
  /api/v1/publications:
    get:
      summary: Tutte le pubblicazioni pubblicazioni
      description: Ottiene la lista tutte le pubblicazioni con relativi dati utente
      parameters:
        - in: query
          name: description
          description: stringa contenuta nel campo description
          schema:
            type: string
        - in: query
          name: category 
          description: stringa perfettamente uguale al campo category, l'utente doverbbe poterne selezionare solo alcune pre-stabilite
          schema: 
            type: string
        - in: query
          name: type
          description: tipologia della pubblicazione, può essere smarrimento o ritrovamento
          schema: 
            type: string
            enum: [lost, found]
        - in: query
          name: date_from
          description: data da cui iniziare a filtrare le pubblicazioni
          schema: 
            type: string
        - in: query
          name: date_before
          description: data entro cui filtrare le pubblicazioni
          schema: 
            type: string
          
      responses:
        '200':
          description: Collezione di pubblicazioni
          content:
           application/json:
             schema:
               type: array
               items:
                $ref: '#/components/schemas/Publication'
  /api/v1/publications/attive:
    get:
      summary: Pubblicazioni attive
      description: Ottiene tutte le pubblicazioni attive
      parameters:
        - in: query
          name: description
          description: stringa contenuta nel campo description
          schema:
            type: string
        - in: query
          name: category 
          description: stringa perfettamente uguale al campo category, l'utente doverbbe poterne selezionare solo alcune pre-stabilite
          schema: 
            type: string
        - in: query
          name: type
          description: tipologia della pubblicazione, può essere smarrimento o ritrovamento
          schema: 
            type: string
            enum: [lost, found]
        - in: query
          name: date_from
          description: data da cui iniziare a filtrare le pubblicazioni
          schema: 
            type: string
        - in: query
          name: date_before
          description: data entro cui filtrare le pubblicazioni
          schema: 
            type: string
      responses:
        '200':
          description: Collezione di pubblicazioni attive attualmente con relativi dati utente
          content:
           application/json:
             schema:
               type: array
               items:
                $ref: '#/components/schemas/Publication'
  /api/v1/auth:
    post:
      summary: Autentica un utente e restituisce un JWT
      description: Invia username e password per ricevere un token di accesso e i dettagli del profilo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login effettuato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  token:
                    type: string
                    description: JWT con ruolo da usare nelle successive chiamate
                  username:
                    type: string
                  role:
                    type: string
                    enum: [user, admin]
                  id:
                    type: string
        '401':
          description: Password errata
         
        '404':
          description: Utente non trovato
          
        


components: 
  schemas:

    Publication:
      type: object
      required:
        - description
        - location
        - type
        - user
      properties:
        description:
          type: string
          description: 'Descrizione della Pubblicazione'
        category:
          type: string
          description: 'Categoria della Pubblicazione'
        notes:
          type: string
          description: 'Note aggiuntive'
        image:
          type: string
          description: 'URL o percorso dell immagine'
        date:
          type: string
          format: date-time
          description: 'Data della Pubblicazione'
        location:
          type: object
          description: 'Dati geografici'
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              enum: [Point]
              description: 'GeoJSON punto'
            coordinates:
              type: array
              items:
                type: number
              description: 'Array di coordinate [longitudine, latitudine]'
            address:
              type: string
              description: 'Indirizzo del luogo'
        state:
          type: string
          enum: [solved, unresolved, decayed]
          default: unresolved
          description: 'Stato della Pubblicazione'
        type:
          type: string
          enum: [lost, found]
          description: 'Indica se è uno smarrimento o ritrovamento'
        user:
          type: string
          description: 'ObjectId dello User'

    User:
      type: object
      required:
        - username
        - password
        - name
        - surname
        - role
      properties:
        username:
          type: string
          description: 'Username unico dell utente'
        password:
          type: string
          description: 'Password'
        email:
          type: string
          description: 'Indirizzo email (solo se il ruolo è "user")'
        name:
          type: string
          description: 'Nome'
        surname:
          type: string
          description: 'Cognome'
        role:
          type: string
          enum: [user, admin]
          default: user
          description: 'Ruolo dell utente'