openapi: '3.0.3'
info:
  title: DoloLost OpenApi 3.0
  description: Api per progetto DoloLost
  version: '2.0'
servers:
  - url: http://localhost:8080
    description: Api in localhost
paths:
  /api/v1/publications:
    get:
      summary: Tutte le pubblicazioni
      description: Ottiene la lista tutte le pubblicazioni con relativi dati utente
      parameters:
        - in: query
          name: description
          description: stringa contenuta nel campo description
          schema:
            type: string
        - in: query
          name: category 
          description: stringa perfettamente uguale al campo category, l'utente dovrebbe poterne selezionare solo alcune pre-stabilite
          schema: 
            type: string
        - in: query
          name: type
          description: tipologia della pubblicazione, può essere smarrimento o ritrovamento
          schema: 
            type: string
            enum: [lost, found]
        - in: query
          name: date_from
          description: data da cui iniziare a filtrare le pubblicazioni
          schema: 
            type: string
        - in: query
          name: date_before
          description: data entro cui filtrare le pubblicazioni
          schema: 
            type: string
      responses:
        '200':
          description: Collezione di pubblicazioni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publication'
    post:
      summary: Crea una nuova pubblicazione
      description: Permette a un utente autenticato di creare una segnalazione di oggetto smarrito o ritrovato. L'ID dell'utente viene estratto automaticamente dal token.
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - category
                - date
                - type
              properties:
                description:
                  type: string
                  minLength: 5
                  maxLength: 500
                  example: "Ho smarrito un mazzo di chiavi vicino alla stazione"
                category:
                  type: string
                  enum: [accessori, elettronica, documenti, chiavi, abbigliamento, "borse e zaini", animali, altro]
                  example: "chiavi"
                notes:
                  type: string
                  maxLength: 1000
                  example: "Il mazzo ha un portachiavi a forma di gatto"
                image:
                  type: string
                  description: URL o stringa base64 dell'immagine
                date:
                  type: string
                  format: date-time
                  description: La data dell'evento (non può essere nel futuro)
                type:
                  type: string
                  enum: [lost, found]
                  example: "lost"
      responses:
        '201':
          description: Pubblicazione creata con successo
        '400':
          description: Errore di validazione (es. descrizione troppo corta, categoria non valida o data futura)
        '401':
          description: Token mancante o non valido (gestito dal tokenChecker)
        '500':
          description: Errore interno del server durante la creazione

  /api/v1/publications/attive:
    get:
      summary: Pubblicazioni attive
      description: Ottiene tutte le pubblicazioni attive
      parameters:
        - in: query
          name: description
          description: Stringa contenuta nel campo description
          schema:
            type: string
        - in: query
          name: category 
          description: Stringa perfettamente uguale al campo category, l'utente dovrebbe poterne selezionare solo alcune pre-stabilite
          schema: 
            type: string
        - in: query
          name: type
          description: Tipologia della pubblicazione, può essere smarrimento o ritrovamento
          schema: 
            type: string
            enum: [lost, found]
        - in: query
          name: date_from
          description: data da cui iniziare a filtrare le pubblicazioni
          schema: 
            type: string
        - in: query
          name: date_before
          description: Data entro cui filtrare le pubblicazioni
          schema: 
            type: string
      responses:
        '200':
          description: Collezione di pubblicazioni attive attualmente con relativi dati utente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publication'

  /api/v1/publications/proprie:
    get:
      summary: Recupera le pubblicazioni dell'utente autenticato
      description: Restituisce un array di pubblicazioni create dall'utente identificato dal token JWT.
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Elenco delle pubblicazioni recuperato con successo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publication'
        '401':
          description: Token mancante o non valido
        '404':
          description: Nessuna pubblicazione trovata
        '500':
          description: Errore interno del server

  /api/v1/users:
    post:
      summary: Registra un nuovo utente
      description: Permette ad un utente anonimo di creare un nuovo profilo e in caso di successo viene automaticamente autenticato con tale profilo 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterInput'
      responses:
        '201':
          description: Registrazione completata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: registrazione completata
                  token:
                    type: string
                    description: 'JWT token'
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Email o username già esistente || Email non valida || La password deve contenere almeno 8 caratteri
        '500':
          description: Errore sconosciuto nella registrazione
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Falso in caso di errore
                  message:
                    type: string
                    example: Errore nella registrazione
                  error:
                    type: string
                    description: Descrizione dell'errore

  /api/v1/auth:
    post:
      summary: Autentica un utente e restituisce un JWT
      description: Invia username e password per ricevere un token di accesso e i dettagli del profilo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login effettuato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  token:
                    type: string
                    description: JWT con ruolo da usare nelle successive chiamate
                  username:
                    type: string
                  role:
                    type: string
                    enum: [user, admin]
                  id:
                    type: string
        '401':
          description: Password errata
        '404':
          description: Utente non trovato




  /api/v2/publications:
    get:
      summary: Tutte le pubblicazioni
      description: Ottiene la lista tutte le pubblicazioni con relativi dati utente
      parameters:
        - in: query
          name: description
          description: stringa contenuta nel campo description
          schema:
            type: string
        - in: query
          name: category 
          description: stringa perfettamente uguale al campo category, l'utente dovrebbe poterne selezionare solo alcune pre-stabilite
          schema: 
            type: string
            enum: [accessori, elettronica, documenti, chiavi, abbigliamento, "borse e zaini", animali, altro]
        - in: query
          name: type
          description: tipologia della pubblicazione, può essere smarrimento o ritrovamento
          schema: 
            type: string
            enum: [lost, found]
        - in: query
          name: date_from
          description: data da cui iniziare a filtrare le pubblicazioni
          schema: 
            type: string
        - in: query
          name: date_before
          description: data entro cui filtrare le pubblicazioni
          schema: 
            type: string
      responses:
        '200':
          description: Collezione di pubblicazioni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publication'
    post:
      summary: Crea una nuova pubblicazione
      description: Permette a un utente autenticato di creare una segnalazione di oggetto smarrito o ritrovato compilando i dati, indicando la posizione geografica e allegando facoltativamente un file d'immagine. L'ID dell'utente viene estratto automaticamente dal token.
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - description
                - category
                - date
                - type
                - address
                - lat
                - lng
              properties:
                description:
                  type: string
                  minLength: 5
                  maxLength: 500
                  example: "Ho smarrito un mazzo di chiavi vicino alla stazione"
                  description: La descrizione dell'oggetto (minimo 5 caratteri escludendo gli spazi vuoti iniziali/finali).
                category:
                  type: string
                  enum: [accessori, elettronica, documenti, chiavi, abbigliamento, "borse e zaini", animali, altro]
                  example: "chiavi"
                  description: Categoria dell'oggetto
                notes:
                  type: string
                  maxLength: 1000
                  example: "Il mazzo ha un portachiavi a forma di gatto"
                  description: Note o dettagli aggiuntivi facoltativi (massimo 1000 caratteri).
                date:
                  type: string
                  format: date-time
                  description: La data e l'ora dell'evento (obbligatoria, valida e non può essere nel futuro).
                type:
                  type: string
                  enum: [lost, found]
                  example: "lost"
                  description: Specifica se l'oggetto è stato perso (lost) o ritrovato (found).
                address:
                  type: string
                  example: "Stazione ferroviaria di Trento, Piazza Dante, 38122 Trento TN"
                  description: Indirizzo testuale del luogo dell'evento.
                lat:
                  type: number
                  minimum: -90
                  maximum: 90
                  example: 45.89
                  description: Latitudine della posizione geografica (compresa tra -90 e 90).
                lng:
                  type: number
                  minimum: -180
                  maximum: 180
                  example: 11.0395
                  description: Longitudine della posizione geografica (compresa tra -180 e 180).
                image:
                  type: string
                  format: binary
                  description: Il file binario dell'immagine dell'oggetto da caricare (gestito via Multer, facoltativo).
      responses:
        '201':
          description: Pubblicazione creata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Pubblicazione creata con successo"
                  self:
                    type: string
                    example: "/api/v2/publications/6a16fcd893e7289ccb256fc0"
                  publication:
                    $ref: '#/components/schemas/Publication'
        '400':
          description: Errore di validazione nei dati inviati (es. coordinate fuori range, indirizzo mancante, data futura, descrizione non valida).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    oneOf:
                      - example: "La descrizione deve essere di almeno 5 caratteri."
                      - example: "La descrizione è troppo lunga (max 500 caratteri)."
                      - example: "Categoria non valida"
                      - example: "Le note non possono superare i 1000 caratteri."
                      - example: "Data non valida o mancante."
                      - example: "La data non può essere nel futuro."
                      - example: "Indirizzo mancante"
                      - example: "Longitudine non valida"
                      - example: "Latitudine non valida"
        '401':
          description: Token x-access-token mancante o non valido (gestito dal middleware tokenChecker).
        '500':
          description: Errore interno del server (fallimento nel database o errore nel caricamento dell'immagine su Supabase storage).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Errore nella creazione pubblicazione"
                  error:
                    type: string
                    example: "Upload immagine fallito"
                  details:
                    type: string
                    example: "The object storage service is temporarily unavailable."
  /api/v2/publications/{id}:
    get:
      summary: Recupera una singola pubblicazione tramite ID
      description: Restituisce i dettagli completi di una specifica pubblicazione (segnalazione) identificata dal suo ID univoco.
      security:
        - tokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID della pubblicazione da recuperare
          schema:
            type: string
      responses:
        '200':
          description: Dettagli della pubblicazione recuperati con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '401':
          description: Token mancante o non valido (Errore restituito dal tokenChecker)
        '404':
          description: Pubblicazione non trovata nel database 
    put:
        summary: Modifica una pubblicazione esistente
        description: Consente all'autore originale della pubblicazione o a un utente con ruolo 'admin' di aggiornare i campi di una segnalazione
        security:
          - tokenAuth: []
        parameters:
          - name: id
            in: path
            required: true
            description: L'ID univoco della pubblicazione da modificare
            schema:
              type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                description: I campi inviati nel body sono facoltativi
                properties:
                  description:
                    type: string
                    minLength: 5
                    maxLength: 500
                  category:
                    type: string
                  date:
                    type: string
                    format: date-time
                  state:
                    type: string
                    enum: [unresolved, solved, decayed]
                  notes:
                    type: string
                  image:
                    type: string
                  type:
                    type: string
                    enum: [lost, found]
        responses:
          '200':
            description: Pubblicazione aggiornata con successo
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                    publication:
                      $ref: '#/components/schemas/Publication'
          '400':
            description: Errore di validazione nei dati inviati
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    error:
                      type: string
          '401':
            description: Token x-access-token mancante o non valido
          '403':
            description: Utente non autorizzato 
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    error:
                      type: string
          '404':
            description: La pubblicazione non esiste.
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    error:
                      type: string
          '500':
            description: Errore interno del server durante il salvataggio o fallimento del caricamento del file su Supabase (es. immagine troppo grande).
    delete:
      summary: Elimina una pubblicazione esistente
      description: Rimuove in modo permanente una pubblicazione dal database. Richiede che l'utente sia autenticato e che la pubblicazione esista.
      tags:
        - Pubblicazioni
      security:
        - tokenAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: L'identificatore univoco della pubblicazione da eliminare.
          schema:
            type: string
      responses:
        '200':
          description: Pubblicazione eliminata con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: object
                    description: Risultato dell'operazione restituito.
                    properties:
                      acknowledged:
                        type: boolean
                        example: true
                      deletedCount:
                        type: integer
                        example: 1
        '401':
          description: Token mancante o non valido .
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: La pubblicazione con l'ID fornito non è stata trovata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Errore interno del server durante l'eliminazione.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
  /api/v2/publications/attive:
   get:
      summary: Pubblicazioni attive
      description: Ottiene tutte le pubblicazioni attive (con stato `unresolved`) applicando filtri testuali, temporali o geografici in base ai parametri passati in query string.
      parameters:
        - in: query
          name: description
          description: Stringa contenuta nel campo description (ricerca case-insensitive)
          schema:
            type: string
        - in: query
          name: category 
          description: Stringa contenuta nel campo category (ricerca case-insensitive)
          schema: 
            type: string
        - in: query
          name: type
          description: Tipologia della pubblicazione, può essere smarrimento (lost) o ritrovamento (found)
          schema: 
            type: string
            enum: [lost, found]
        - in: query
          name: date_from
          description: Data a partire dalla quale filtrare le pubblicazioni (formato ISO 8601 o stringa di data valida)
          schema: 
            type: string
            format: date-time
        - in: query
          name: date_before
          description: Data entro la quale filtrare le pubblicazioni (formato ISO 8601 o stringa di data valida)
          schema: 
            type: string
            format: date-time
        - in: query
          name: distance
          description: Raggio massimo di distanza espresso in metri/chilometri per la ricerca spaziale near. Deve essere un valore maggiore o uguale a 0.
          schema:
            type: number
            minimum: 0
        - in: query
          name: userLngLat
          description: Coordinate geografiche del centro di ricerca, fornite sotto forma di stringa con valori separati da virgola ("longitudine,latitudine"). La longitudine dev'essere compresa tra -180 e 180; la latitudine tra -90 e 90.
          schema:
            type: string
      responses:
        '200':
          description: Collezione di pubblicazioni attive attualmente con relativi dati utente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publication'
        '400':
          description: Errore di validazione sui parametri geografici. Viene restituito se la distanza è negativa o se le coordinate non rispettano i limiti terrestri.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                    example: Longitudine non valida, Latitudine non valida, Distanza non valida
  /api/v2/publications/proprie:
    get:
      summary: Recupera le pubblicazioni dell'utente autenticato
      description: Restituisce un array di pubblicazioni create dall'utente identificato dal token JWT.
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Elenco delle pubblicazioni recuperato con successo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publication'
        '401':
          description: Token mancante o non valido
        '500':
          description: Errore interno del server

  /api/v2/users:
    post:
      summary: Registra un nuovo utente
      description: Permette ad un utente anonimo di creare un nuovo profilo e in caso di successo viene automaticamente autenticato con tale profilo 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterInput'
      responses:
        '201':
          description: Registrazione completata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: registrazione completata
                  token:
                    type: string
                    description: 'JWT token'
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Email o username già esistente || Email non valida || La password deve contenere almeno 8 caratteri
        '500':
          description: Errore sconosciuto nella registrazione
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Falso in caso di errore
                  message:
                    type: string
                    example: Errore nella registrazione
                  error:
                    type: string
                    description: Descrizione dell'errore
    get:
      summary: Ottenimento di tutti gli utenti registrati
      description: Restituisce la lista completa di tutti gli utenti presenti nel database. Questa operazione richiede privilegi di amministratore.
      security:
        - tokenAuth: []
      responses:
        '200':
          description: OK - Lista di tutti gli utenti recuperata con successo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized - Token mancante o non fornito nell'header.
        '403':
          description: Forbidden - L'utente è autenticato ma non possiede il ruolo di amministratore.

  /api/v2/users/{id}:
    put:
      summary: Modifica dati utente
      description: Consente di aggiornare i dati di un utente (username, email, password, nome, cognome). 
      security:
        - tokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID univoco dell'utente da modificare
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Nuovo username dell'utente (deve essere univoco nel sistema).
                  example: "alice02"
                email:
                  type: string
                  format: email
                  description: Nuova email dell'utente (deve essere univoca e rispettare il formato email valido).
                  example: "alice02@gmail.com"
                old_password:
                  type: string
                  description: Vecchia password corrente dell'utente. Obbligatoria solo se si inserisce new_password.
                  example: "alice2025"
                new_password:
                  type: string
                  minLength: 8
                  description: Nuova password da impostare. Richiede la verifica della vecchia password e deve essere lunga almeno 8 caratteri.
                  example: "alice2027"
                name:
                  type: string
                  description: Nuovo nome dell'utente.
                  example: "Alice"
                surname:
                  type: string
                  description: Nuovo cognome dell'utente.
                  example: "Rossi"
      responses:
        '200':
          description: Utente aggiornato con successo. Restituisce l'oggetto utente aggiornato.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User aggiornato con successo!"
                  user:
                    $ref: '#/components/schemas/UserResponse'
                  self:
                    type: string

        '400':
          description: |
            Bad Request. Questo errore viene restituito in presenza di uno dei seguenti problemi di validazione:
            - Username già esistente nel DB.
            - Email già esistente nel DB.
            - Formato Email non valido.
            - Nuova password inferiore a 8 caratteri.
            - Nuova password inserita senza la vecchia password.
            - Vecchia password errata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
        '403':
          description: Forbidden. L'utente autenticato non è il proprietario del profilo e non possiede i privilegi di amministratore.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                    example: "Non sei autorizzato a modificare i dati di questo utente."
        '500':
          description: Internal Server Error. Si è verificato un errore imprevisto durante la modifica o il salvataggio sul database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  error:
                    type: string
    get:
      summary: Recupera i dettagli di un utente
      description: Cerca nel database un utente tramite il suo ID univoco e ne restituisce i dati di contatto (id ,nome, cognome, username, email, ruolo).
      parameters:
        - in: path
          name: id
          required: true
          description: L'identificatore univoco dell'utente.
          schema:
            type: string
            example: 69fa1f15cff2d08355d320f2
      responses:
        '200':
          description: Utente trovato e dati restituiti con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      
        '404':
          description: Utente non trovato nel database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user not found
    delete:
      summary: Elimina un account utente
      description: Consente l'eliminazione definitiva di un utente. L'operazione è permessa solo all'utente proprietario dell'account stesso oppure a un utente con privilegi di 'admin'.
      security:
        - tokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: L'ID univoco dell'utente da eliminare
          schema:
            type: string

      responses:
        '200':
          description: Account eliminato con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Account eliminato con successo"
        '401':
          description: Token x-access-token mancante o non valido (gestito dal middleware tokenChecker).
        '403':
          description: Utente non autorizzato (il richiedente non è il proprietario dell'account e non è un amministratore).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
        '404':
          description: L'utente specificato nell'ID non esiste nel database (intercettato dal middleware router.use).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
        '500':
          description: Errore interno del server durante la cancellazione sul database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string
  /api/v2/users/admin:
    post:
      summary: Registrazione nuovo Amministratore
      description: Consente a un amministratore autenticato di creare un nuovo utente con ruolo `admin`.
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - surname
                - username
                - password
              properties:
                name:
                  type: string
                  description: Nome dell'amministratore
                surname:
                  type: string
                  description: Cognome dell'amministratore
                username:
                  type: string
                  description: Username univoco per l'accesso
                password:
                  type: string
                  description: Password di accesso (minimo 8 caratteri)
                  minLength: 8
      responses:
        '201':
          description: Registrazione completata con successo. Restituisce il token e i dati dell'admin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: registrazione completata
                  token:
                    type: string
                    description: Token JWT generato per il nuovo amministratore
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Errori di Validazione. Può essere causata da campi mancanti, formato password errato o username già occupato.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
        '403':
          description: Accesso negato. Il token non è di un amministratore o non è valido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                    example: "Accesso negato: richiesti privilegi di amministratore"
        '500':
          description: Errore interno del server durante il salvataggio o la cifratura dei dati.

  /api/v2/auth:
    post:
      summary: Autentica un utente e restituisce un JWT
      description: Invia username e password per ricevere un token di accesso e i dettagli del profilo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login effettuato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  token:
                    type: string
                    description: JWT con ruolo da usare nelle successive chiamate
                  username:
                    type: string
                  role:
                    type: string
                    enum: [user, admin]
                  id:
                    type: string
        '401':
          description: Password errata
        '404':
          description: Utente non trovato

components: 
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: x-access-token

  schemas:
    Publication:
      type: object
      required:
        - description
        - location
        - type
        - user
      properties:
        description:
          type: string
          description: 'Descrizione della Pubblicazione'
        category:
          type: string
          description: 'Categoria della Pubblicazione'
        notes:
          type: string
          description: 'Note aggiuntive'
        image:
          type: string
          description: 'URL o percorso dell''immagine'
        date:
          type: string
          format: date-time
          description: 'Data della Pubblicazione'
        location:
          type: object
          description: 'Dati geografici'
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              enum: [Point]
              description: 'GeoJSON punto'
            coordinates:
              type: array
              items:
                type: number
              description: 'Array di coordinate [longitudine, latitudine]'
            address:
              type: string
              description: 'Indirizzo del luogo'
        state:
          type: string
          enum: [solved, unresolved, decayed]
          default: unresolved
          description: 'Stato della Pubblicazione'
        type:
          type: string
          enum: [lost, found]
          description: 'Indica se è uno smarrimento o ritrovamento'
        user:
          type: string
          description: 'ObjectId dello User'

    UserRegisterInput:
      type: object
      required:
        - username
        - password
        - name
        - surname
        - role
        - email
      properties:
        username:
          type: string
          description: 'Username unico che l''utente desidera registrare'
        password:
          type: string
          minLength: 8
          description: 'Password di accesso (minimo 8 caratteri)'
        email:
          type: string
          format: email
          description: 'Indirizzo email associato al profilo'
        name:
          type: string
          description: 'Nome dell''utente'
        surname:
          type: string
          description: 'Cognome dell''utente'
        role:
          type: string
          enum: [user, admin]
          default: user
          description: 'Ruolo dell''utente in fase di registrazione'

    UserResponse:
      type: object
      required:
        - id
        - username
        - name
        - surname
        - role
        - email
      properties:
        id:
          type: string
          description: 'ID univoco dell''utente generato dal sistema'
        username:
          type: string
          description: 'Username dell''utente'
        email:
          type: string
          format: email
          description: 'Indirizzo email dell''utente'
        name:
          type: string
          description: 'Nome'
        surname:
          type: string
          description: 'Cognome'
        role:
          type: string
          enum: [user, admin]

          